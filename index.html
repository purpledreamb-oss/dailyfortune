<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日日一算 — 問天一卦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FDF6EC;
      --warm-beige: #F5E6D3;
      --latte: #D4B896;
      --brown: #8B7355;
      --dark-brown: #5C4A32;
      --soft-orange: #E8A87C;
      --muted-rose: #D4A0A0;
      --sage: #A8B5A2;
      --text: #4A3F35;
      --text-light: #8B7D6B;
      --card-bg: rgba(255,255,255,0.6);
      --border: rgba(212,184,150,0.25);
      --gold: #C9A96E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; height: 100%; font-size: 150%; }
    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(253,246,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212,184,150,0.15);
    }
    .logo {
      font-size: 1.2rem; font-weight: 600; color: var(--dark-brown);
      letter-spacing: 0.15em;
    }
    .logo span {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; color: var(--text-light);
      font-size: 0.75rem; display: block; margin-top: 2px;
      letter-spacing: 0.2em;
    }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--text-light);
      font-size: 0.85rem; font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300; letter-spacing: 0.08em;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--dark-brown); }

    /* ===== HERO / INPUT ===== */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 6rem 2rem 3rem;
      text-align: center;
      background: linear-gradient(170deg, var(--cream) 0%, var(--warm-beige) 50%, #EDD9C0 100%);
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: ''; position: absolute; top: -40%; right: -15%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(232,168,124,0.1) 0%, transparent 70%);
      border-radius: 50%; animation: float 8s ease-in-out infinite;
    }
    #hero::after {
      content: ''; position: absolute; bottom: -25%; left: -8%;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(168,181,162,0.08) 0%, transparent 70%);
      border-radius: 50%; animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.04); }
    }
    .hero-inner { position: relative; z-index: 1; width: 100%; max-width: 480px; }
    .hero-date {
      font-family: 'Noto Sans TC', sans-serif; font-weight: 300;
      font-size: 0.8rem; color: var(--latte); letter-spacing: 0.25em;
      margin-bottom: 1.5rem; opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
    }
    .hero-tag {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      font-weight: 400; letter-spacing: 0.35em; color: var(--soft-orange);
      margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.8s 0.35s forwards;
    }
    .hero-title {
      font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 300;
      color: var(--dark-brown); letter-spacing: 0.15em;
      margin-bottom: 0.3rem;
      opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
    }
    .hero-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; color: var(--text-light);
      letter-spacing: 0.15em; font-style: italic;
      margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp 0.8s 0.65s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== FORM ===== */
    .form-card {
      background: rgba(255,255,255,0.5);
      border-radius: 1.2rem;
      padding: 2rem 1.8rem;
      backdrop-filter: blur(8px);
      max-width: 480px; width: 100%;
      border: 1px solid var(--border);
      opacity: 0; animation: fadeUp 0.8s 0.8s forwards;
    }
    .form-row {
      display: flex; gap: 0.8rem;
      margin-bottom: 1rem;
    }
    .form-group {
      flex: 1; display: flex; flex-direction: column;
    }
    .form-group label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.78rem; font-weight: 300;
      color: var(--text-light); margin-bottom: 0.3rem;
      letter-spacing: 0.1em;
    }
    .form-group select,
    .form-group input {
      padding: 0.55rem 0.7rem;
      border: 1px solid rgba(212,184,150,0.3);
      border-radius: 0.6rem;
      font-size: 0.9rem;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      background: rgba(255,251,245,0.8);
      color: var(--text);
      transition: border-color 0.3s;
    }
    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: var(--latte);
    }
    .btn-fortune {
      width: 100%; padding: 0.85rem;
      background: var(--dark-brown);
      color: var(--cream);
      border: none;
      border-radius: 0.6rem;
      font-size: 0.95rem; font-weight: 400;
      font-family: 'Noto Serif TC', serif;
      letter-spacing: 0.3em;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: all 0.3s;
    }
    .btn-fortune:hover {
      background: var(--brown);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(92,74,50,0.15);
    }
    .btn-fortune:active { transform: translateY(0); }

    /* ===== RESULTS ===== */
    #results {
      display: none;
      padding: 2rem 1.5rem 3rem;
      max-width: 720px;
      margin: 0 auto;
    }
    #results.show { display: block; animation: fadeIn 0.6s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-size: 1.1rem; font-weight: 400;
      color: var(--dark-brown);
      margin: 2.5rem 0 1rem;
      text-align: center;
      letter-spacing: 0.2em;
    }
    .section-title::before,
    .section-title::after {
      content: ''; display: inline-block;
      width: 2rem; height: 1px;
      background: var(--latte);
      vertical-align: middle;
      margin: 0 0.8rem;
    }

    /* Overall fortune card */
    .overall-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.5), rgba(245,230,211,0.4));
      border-radius: 1.2rem;
      padding: 2.5rem 2rem;
      text-align: center;
      border: 1px solid var(--border);
      margin-bottom: 2rem;
      backdrop-filter: blur(4px);
    }
    .fortune-level {
      font-size: 2.8rem; font-weight: 300;
      color: var(--dark-brown);
      letter-spacing: 0.2em;
    }
    .fortune-stars { font-size: 1.3rem; color: var(--gold); margin: 0.6rem 0; letter-spacing: 0.15em; }
    .fortune-score {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem; color: var(--text-light); font-weight: 300;
    }

    /* Profile summary */
    .profile-row {
      display: flex; flex-wrap: wrap; gap: 0.6rem;
      justify-content: center; margin-bottom: 1.5rem;
    }
    .profile-tag {
      background: rgba(255,255,255,0.5);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.3rem 0.9rem;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.78rem; font-weight: 300;
      color: var(--text-light);
    }
    .profile-tag strong { color: var(--dark-brown); font-weight: 500; }

    /* Category cards */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.8rem;
      margin-bottom: 2rem;
    }
    .cat-card {
      background: var(--card-bg);
      border-radius: 1rem;
      padding: 1.2rem;
      border: 1px solid var(--border);
      backdrop-filter: blur(4px);
    }
    .cat-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.5rem;
    }
    .cat-name { font-weight: 400; font-size: 0.95rem; letter-spacing: 0.08em; }
    .cat-stars { color: var(--gold); font-size: 0.85rem; }
    .cat-bar {
      height: 3px; background: rgba(212,184,150,0.2);
      border-radius: 2px; margin-bottom: 0.5rem; overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--latte), var(--soft-orange));
      transition: width 0.8s ease;
    }
    .cat-text {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; color: var(--text-light);
      line-height: 1.6; font-weight: 300;
    }

    /* Lucky section */
    .lucky-row {
      display: flex; flex-wrap: wrap; gap: 0.8rem;
      justify-content: center; margin-bottom: 2rem;
    }
    .lucky-item {
      background: var(--card-bg);
      border-radius: 1rem;
      padding: 0.9rem 1.3rem;
      text-align: center;
      border: 1px solid var(--border);
      min-width: 110px;
      backdrop-filter: blur(4px);
    }
    .lucky-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.72rem; color: var(--text-light);
      margin-bottom: 0.3rem; font-weight: 300;
      letter-spacing: 0.1em;
    }
    .lucky-value {
      font-size: 1rem; font-weight: 500;
      color: var(--dark-brown);
    }
    .lucky-color-swatch {
      display: inline-block; width: 20px; height: 20px;
      border-radius: 50%; vertical-align: middle;
      margin-right: 0.3rem; border: 1px solid var(--border);
    }

    /* Ziwei chart */
    .ziwei-chart {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, auto);
      gap: 1px;
      background: var(--latte);
      border-radius: 0.8rem;
      overflow: hidden;
      margin-bottom: 2rem;
      border: 1px solid var(--latte);
    }
    .ziwei-cell {
      background: rgba(253,246,236,0.95);
      padding: 0.5rem 0.4rem;
      min-height: 80px;
      font-size: 0.72rem;
      line-height: 1.4;
      position: relative;
    }
    .ziwei-cell.highlight { background: rgba(232,168,124,0.08); }
    .ziwei-cell.center {
      grid-column: 2 / 4;
      grid-row: 2 / 4;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--cream), var(--warm-beige));
      font-size: 0.9rem;
    }
    .ziwei-palace { font-weight: 500; color: var(--dark-brown); font-size: 0.7rem; }
    .ziwei-stars { color: var(--text); font-size: 0.65rem; }
    .ziwei-hua { color: var(--gold); font-size: 0.6rem; }

    /* Hexagram */
    .hex-card {
      background: var(--card-bg);
      border-radius: 1rem;
      padding: 1.8rem;
      text-align: center;
      border: 1px solid var(--border);
      margin-bottom: 2rem;
      backdrop-filter: blur(4px);
    }
    .hex-symbol { font-size: 2.8rem; line-height: 1; opacity: 0.7; }
    .hex-name {
      font-size: 1.2rem; font-weight: 400;
      color: var(--dark-brown); margin: 0.4rem 0;
      letter-spacing: 0.15em;
    }
    .hex-judgment {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem; color: var(--text-light);
      margin-bottom: 0.5rem; font-weight: 300;
    }
    .hex-advice {
      font-size: 0.92rem; color: var(--text);
      font-style: italic; line-height: 1.7;
    }

    /* Fortune text */
    .fortune-text-card {
      background: var(--card-bg);
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
      margin-bottom: 2rem;
      line-height: 2;
      font-size: 0.92rem;
      backdrop-filter: blur(4px);
    }

    /* Back button */
    .btn-back {
      display: block; margin: 1rem auto;
      padding: 0.6rem 2rem;
      background: transparent;
      border: 1px solid var(--latte);
      color: var(--text-light);
      border-radius: 2rem;
      font-size: 0.9rem; font-weight: 300;
      font-family: 'Noto Sans TC', sans-serif;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-back:hover {
      background: var(--dark-brown);
      border-color: var(--dark-brown);
      color: var(--cream);
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 3rem 1.5rem;
      text-align: center;
      background: linear-gradient(135deg, var(--warm-beige), #EDD9C0);
      border-top: 1px solid rgba(212,184,150,0.15);
    }
    .daily-series {
      margin-bottom: 1.5rem;
    }
    .daily-series h3 {
      font-size: 0.7rem; font-weight: 300;
      font-family: 'Noto Sans TC', sans-serif;
      letter-spacing: 0.3em; color: var(--text-light);
      margin-bottom: 1rem;
    }
    .daily-links {
      display: flex; flex-wrap: wrap;
      gap: 0.6rem; justify-content: center;
    }
    .daily-links a {
      display: inline-block;
      padding: 0.4rem 1rem;
      background: rgba(255,255,255,0.5);
      border-radius: 2rem;
      text-decoration: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; font-weight: 300;
      color: var(--text-light);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }
    .daily-links a:hover {
      background: rgba(255,255,255,0.8);
      color: var(--dark-brown);
    }
    .copyright {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem; color: var(--text-light);
      margin-top: 1.2rem; letter-spacing: 0.1em;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      nav { padding: 0.8rem 1.2rem; }
      .hero-title { font-size: 2rem; }
      .form-card { padding: 1.5rem 1.2rem; }
      .form-row { flex-direction: column; gap: 0.5rem; }
      .categories-grid { grid-template-columns: 1fr 1fr; }
      .ziwei-cell { min-height: 60px; font-size: 0.6rem; padding: 0.3rem; }
      .ziwei-palace { font-size: 0.6rem; }
      .ziwei-stars { font-size: 0.55rem; }
      .lucky-row { gap: 0.5rem; }
      .lucky-item { min-width: 90px; padding: 0.7rem; }
      .section-title::before, .section-title::after { width: 1.2rem; }
    }
    @media (max-width: 400px) {
      .categories-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">日日一算<span>divine your day</span></div>
    <ul class="nav-links">
      <li><a href="#hero">問卦</a></li>
      <li><a href="javascript:void(0)" onclick="scrollToResults()">卦象</a></li>

  <section id="hero">
    <div class="hero-inner">
    <p class="hero-date" id="heroDate"></p>
    <p class="hero-tag">每日運勢 ✦ 紫微命盤 ✦ 易經卦象</p>
    <h1 class="hero-title">日日一算</h1>
    <p class="hero-subtitle">the stars whisper, if you listen</p>

    <div class="form-card">
      <div class="form-row">
        <div class="form-group">
          <label>出生年</label>
          <select id="birthYear"></select>
        </div>
        <div class="form-group">
          <label>出生月</label>
          <select id="birthMonth"></select>
        </div>
        <div class="form-group">
          <label>出生日</label>
          <select id="birthDay"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>出生時辰</label>
          <select id="birthHour">
            <option value="-1">不知道</option>

        <div class="form-group">
          <label>性別</label>
          <select id="gender">
            <option value="M">男</option>
            <option value="F">女</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>血型</label>
          <select id="bloodType">
            <option value="A">A 型</option>
            <option value="B">B 型</option>
            <option value="O">O 型</option>
            <option value="AB">AB 型</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>姓氏筆畫</label>
          <input type="number" id="surnameStrokes" min="1" max="30" value="8" placeholder="例：8">
        </div>
        <div class="form-group">
          <label>名字筆畫（總和）</label>
          <input type="number" id="nameStrokes" min="1" max="60" value="15" placeholder="例：15">
        </div>
      </div>
      <button class="btn-fortune" onclick="calculate()">問天一卦</button>
    </div>
    </div>
  </section>

  <section id="results">
    <div id="resultContent"></div>
    <button class="btn-back" onclick="goBack()">重新算一次</button>
    <p style="text-align:center;font-size:0.78rem;color:var(--text-light);margin-top:1.2rem;line-height:1.6;opacity:0.75">⚠️ 此結果僅供參考和娛樂，不建議作為重大決策的依據</p>
  </section>

  <footer style="text-align:center;padding:40px 20px;border-top:1px solid rgba(0,0,0,0.08);">
    <p style="font-family:'Cormorant Garamond',serif;font-size:0.8rem;letter-spacing:4px;color:#8a8580;">daily fortune &copy; 2026 &mdash; the stars whisper, if you listen</p>

    </div>

<script>
// ========== DATA ==========

// Heavenly Stems & Earthly Branches
const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const STEM_ELEMENTS = ['木','木','火','火','土','土','金','金','水','水'];
const BRANCH_ELEMENTS = ['水','土','木','木','土','火','火','土','金','金','土','水'];

// Place 14 main stars based on Ziwei position
function placeMainStars(ziweiPos) {
  const stars = new Array(12).fill(null).map(() => []);
  // 紫微星系 (clockwise from ziwei)
  const zwGroup = [0, -1, -2, -3, -4, -5]; // 紫微,天機,太陽(skip),武曲,天同,廉貞(skip to)
  stars[ziweiPos].push('紫微');
  stars[(ziweiPos + 11) % 12].push('天機');
  // 太陽 skip one
  stars[(ziweiPos + 9) % 12].push('太陽');
  stars[(ziweiPos + 8) % 12].push('武曲');
  stars[(ziweiPos + 7) % 12].push('天同');
  // 廉貞
  stars[(ziweiPos + 4) % 12].push('廉貞');

  // 天府星系 (counter-clockwise from tianfu)
  const tianfuPos = (12 - ziweiPos + 4) % 12; // Mirror of ziwei around 寅午 axis
  stars[tianfuPos].push('天府');
  stars[(tianfuPos + 1) % 12].push('太陰');
  stars[(tianfuPos + 2) % 12].push('貪狼');
  stars[(tianfuPos + 3) % 12].push('巨門');
  stars[(tianfuPos + 4) % 12].push('天相');
  stars[(tianfuPos + 5) % 12].push('天梁');
  stars[(tianfuPos + 6) % 12].push('七殺');
  stars[(tianfuPos + 10) % 12].push('破軍');

  return stars;
}

// Place auxiliary stars
function placeAuxStars(yearStem, yearBranch, hour, stars) {
  // 文昌: based on birth hour (巳起逆行)
  const wenchangPos = (10 - hour + 12) % 12;
  stars[wenchangPos].push('文昌');
  // 文曲: based on birth hour (巳起順行)
  const wenquPos = (4 + hour) % 12;
  stars[wenquPos].push('文曲');
  // 左輔: based on lunar month (辰起順行)
  // 右弼: based on lunar month (戌起逆行)
  // For simplicity, derive from year branch
  stars[(yearBranch + 4) % 12].push('左輔');
  stars[(10 - yearBranch + 12) % 12].push('右弼');
  // 天魁/天鉞: based on year stem
  const kuiYue = {
    0:[1,7], 1:[0,8], 2:[11,9], 3:[11,9], 4:[1,7],
    5:[0,8], 6:[7,1], 7:[6,2], 8:[3,5], 9:[3,5]
  };
  const [kuiPos, yuePos] = kuiYue[yearStem] || [0,6];
  stars[kuiPos].push('天魁');
  stars[yuePos].push('天鉞');
  return stars;
}

function getLunarDate(year, month, day) {
  const idx = year - 1940;
  if (idx < 0 || idx >= LUNAR_NY.length) return { lYear: year, lMonth: 1, lDay: 1, isLeap: false };

  const nyMonth = LUNAR_NY[idx][0];
  const nyDay = LUNAR_NY[idx][1];
  const info = LUNAR_INFO[idx];

  // Use UTC to avoid DST issues
  const nyDate = Date.UTC(year, nyMonth - 1, nyDay);
  const targetDate = Date.UTC(year, month - 1, day);
  let offset = Math.round((targetDate - nyDate) / 86400000);

  let lYear = year;
  if (offset < 0) {
    // Before lunar new year, belongs to previous lunar year
    const prevIdx = idx - 1;
    if (prevIdx < 0) return { lYear: year - 1, lMonth: 12, lDay: 1, isLeap: false };
    const prevInfo = LUNAR_INFO[prevIdx];
    const prevNY = LUNAR_NY[prevIdx];
    offset = Math.round((targetDate - Date.UTC(year - 1, prevNY[0] - 1, prevNY[1])) / 86400000);
    lYear = year - 1;
    return lunarFromOffset(offset, prevInfo, lYear);
  }

  return lunarFromOffset(offset, info, lYear);
}

function lunarFromOffset(offset, info, lYear) {
  const leapMonth = info & 0xF; // bits 0-3: leap month number (0=none)

  for (let m = 1; m <= 12; m++) {
    let days = (info & (1 << (16 - m))) ? 30 : 29;
    if (offset < days) {
      return { lYear, lMonth: m, lDay: offset + 1, isLeap: false };
    }
    offset -= days;

    if (leapMonth === m) {
      days = (info & 0x10000) ? 30 : 29; // bit 16: leap month days
      if (offset < days) {
        return { lYear, lMonth: m, lDay: offset + 1, isLeap: true };
      }
      offset -= days;
    }
  }
  return { lYear, lMonth: 12, lDay: offset + 1, isLeap: false };
}

// Get year stem and branch index
function getYearStemBranch(year) {
  return { stem: (year - 4) % 10, branch: (year - 4) % 12 };
}

// Get command palace position
function getCommandPalace(lunarMonth, hour) {
  // 寅(2) 起正月，逆數月份，順數時辰
  return (2 + lunarMonth - 1 - hour + 120) % 12;
}

// Get command palace stem from year stem and palace branch
function getPalaceStem(yearStem, palaceBranch) {
  // 五虎遁: 甲己起丙寅, 乙庚起戊寅, 丙辛起庚寅, 丁壬起壬寅, 戊癸起甲寅
  const starts = [2, 4, 6, 8, 0];
  const startStem = starts[yearStem % 5];
  return (startStem + palaceBranch - 2 + 10) % 10;
}

// Full Ziwei chart calculation
function calculateZiweiChart(birthYear, birthMonth, birthDay, birthHour) {
  const lunar = getLunarDate(birthYear, birthMonth, birthDay);
  const { stem: yearStem, branch: yearBranch } = getYearStemBranch(lunar.lYear);

  // Command palace position
  const cmdPos = getCommandPalace(lunar.lMonth, birthHour);
  const cmdStem = getPalaceStem(yearStem, (cmdPos + 2) % 12); // adjust for branch offset

  // Five Element Bureau
  const bureau = FIVE_BUREAU[cmdStem % 5][(cmdPos)] || 2;

  // Place Ziwei star
  const ziweiPos = getZiweiPosition(bureau, lunar.lDay);

  // Place all main stars
  let stars = placeMainStars(ziweiPos);

  // Place auxiliary stars
  stars = placeAuxStars(yearStem, yearBranch, birthHour, stars);

  // Four Transformations
  const stemChar = STEMS[yearStem];
  const trans = FOUR_TRANS[stemChar] || FOUR_TRANS['甲'];
  const transMap = {};
  trans.forEach((star, i) => { transMap[star] = (transMap[star] || '') + TRANS_NAMES[i]; });

  // Build palace data
  const palaces = [];
  for (let i = 0; i < 12; i++) {
    const pos = (cmdPos + i) % 12;
    const palaceStars = stars[pos] || [];
    const hua = {};
    palaceStars.forEach(s => { if (transMap[s]) hua[s] = transMap[s]; });
    palaces.push({
      name: PALACE_NAMES[i],
      branch: BRANCHES[pos],
      branchIndex: pos,
      stars: palaceStars,
      hua,
    });
  }

  return {
    lunar, yearStem, yearBranch, cmdPos, bureau, ziweiPos,
    palaces, transMap,
    cmdStarMain: stars[cmdPos].length > 0 ? stars[cmdPos][0] : '天府',
  };
}

}

// ========== DETERMINISTIC RNG ==========
function hashSeed(...args) {
  let h = 0x811c9dc5;
  for (const arg of args) {
    const s = String(arg);
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 0x01000193);
    }
  }
  h = ((h >>> 16) ^ h) * 0x45d9f3b;
  h = ((h >>> 16) ^ h) * 0x45d9f3b;
  h = (h >>> 16) ^ h;
  return h >>> 0;
}

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ========== DAY PILLAR ==========
function getDayPillar(year, month, day) {
  const ref = new Date(1900, 0, 1); // Jan 1 1900 = 甲子 + offset
  const target = new Date(year, month - 1, day);
  const days = Math.floor((target - ref) / 86400000);
  // Jan 1 1900 is 甲戌 day (stem=0, branch=10)
  const stemIdx = ((days % 10) + 10) % 10;
  const branchIdx = ((days + 10) % 12 + 12) % 12;
  return { stem: stemIdx, branch: branchIdx };
}

// ========== ZODIAC RELATIONSHIPS ==========
function getZodiacRelation(a, b) {
  for (const [x, y] of SIX_HARMONIES) {
    if ((a === x && b === y) || (a === y && b === x)) return { type: '六合', score: 90 };
  }
  for (const trio of THREE_HARMONIES) {
    if (trio.includes(a) && trio.includes(b)) return { type: '三合', score: 80 };
  }
  for (const [x, y] of SIX_CLASHES) {
    if ((a === x && b === y) || (a === y && b === x)) return { type: '六沖', score: 25 };
  }
  return { type: '平', score: 55 };
}

function getFortuneText(rng, overallScore, categoryScores) {
  const level = overallScore >= 75 ? 'great' : overallScore >= 55 ? 'good' : overallScore >= 35 ? 'neutral' : 'bad';

  const pick = (arr) => arr[Math.floor(rng() * arr.length)];

  let text = pick(FORTUNE_TEXTS.opening[level]);
  const cats = ['love','career','wealth','health','study','social'];
  const catNames = ['愛情','事業','財運','健康','學業','人際'];

  // Pick top 2 and bottom 1 category to mention
  const sorted = cats.map((c, i) => ({ cat: c, name: catNames[i], score: categoryScores[c] }))
    .sort((a, b) => b.score - a.score);

  const topCat = sorted[0];
  const topLevel = topCat.score >= 70 ? 'high' : topCat.score >= 45 ? 'mid' : 'low';
  text += topCat.name + '方面，' + pick(FORTUNE_TEXTS[topCat.cat][topLevel]);

  const botCat = sorted[5];
  const botLevel = botCat.score >= 70 ? 'high' : botCat.score >= 45 ? 'mid' : 'low';
  text += botCat.name + '方面需留意，' + pick(FORTUNE_TEXTS[botCat.cat][botLevel]);

  text += pick(FORTUNE_TEXTS.closing[level]);
  return text;
}

// ========== MAIN CALCULATION ==========
function calculateFortune(birthYear, birthMonth, birthDay, birthHour, gender, bloodType, surnameStrokes, nameStrokes) {
  const now = new Date();
  const todayY = now.getFullYear(), todayM = now.getMonth() + 1, todayD = now.getDate();

  // Seed
  const seed = hashSeed(birthYear, birthMonth, birthDay, birthHour, gender, bloodType, surnameStrokes, nameStrokes, todayY, todayM, todayD);
  const rng = mulberry32(seed);

  // 1. Chinese Zodiac
  const animalIdx = (birthYear - 4) % 12;
  const todayPillar = getDayPillar(todayY, todayM, todayD);
  const todayAnimalIdx = todayPillar.branch;
  const zodiacRel = getZodiacRelation(animalIdx, todayAnimalIdx);

  // 2. Five Elements
  const yearSB = getYearStemBranch(birthYear);
  const myElement = STEM_ELEMENTS[yearSB.stem];
  const todayElement = STEM_ELEMENTS[todayPillar.stem];
  const elemInteraction = getElementInteraction(myElement, todayElement);

  // 3. Western Zodiac
  const western = getWesternZodiac(birthMonth, birthDay);

  // 4. Day pillar (60 甲子 cycle position)
  const birthPillar = getDayPillar(birthYear, birthMonth, birthDay);
  const birthCycle = (birthPillar.stem * 6 + birthPillar.branch) % 60;
  const todayCycle = (todayPillar.stem * 6 + todayPillar.branch) % 60;
  const cycleDiff = Math.abs(todayCycle - birthCycle);
  const cycleScore = 50 + 30 * Math.cos(cycleDiff * Math.PI / 30);

  // 5. Hexagram
  const hexagram = getHexagram(rng);

  // 6. Ziwei chart
  const ziwei = calculateZiweiChart(birthYear, birthMonth, birthDay, birthHour);
  const cmdStar = ziwei.cmdStarMain;
  const cmdStarCats = STAR_CATEGORIES[cmdStar] || STAR_CATEGORIES['天府'];

  // Flow day palace
  const flowDayPos = todayPillar.branch;
  let flowPalace = null;
  for (const p of ziwei.palaces) {
    if (p.branchIndex === flowDayPos) { flowPalace = p; break; }
  }
  const flowStarScore = flowPalace && flowPalace.stars.length > 0
    ? flowPalace.stars.reduce((sum, s) => sum + (STAR_FORTUNE[s] || 0.5), 0) / flowPalace.stars.length
    : 0.5;

  // 7. Blood type & Name & Gender
  const bt = BLOOD_TYPES[bloodType] || BLOOD_TYPES['O'];
  const nameFortune = getNameFortune(surnameStrokes, nameStrokes);
  const genderMod = gender === 'M' ? 0.02 : -0.02; // Subtle modifier

  // ===== SCORE COMPOSITION =====
  const categories = {};
  const catKeys = ['love','career','wealth','health','study','social'];

  for (const key of catKeys) {
    const random = rng() * 100; // 0-100
    const zodiacScore = zodiacRel.score;
    const elemScore = elemInteraction.score;
    const westernScore = (western.weights[key] || 0.5) * 100;
    const hexMod = hexagram.tone * 100;
    const ziweiScore = ((cmdStarCats[key] || 0.5) * 0.5 + flowStarScore * 0.5) * 100;
    const btScore = (bt.weights[key] || 0.5) * 100;
    const nameScore = nameFortune;

    const score = Math.round(
      random * 0.15
      + ziweiScore * 0.30
      + zodiacScore * 0.10
      + elemScore * 0.10
      + westernScore * 0.10
      + hexMod * 0.10
      + btScore * 0.05
      + nameScore * 0.05
      + (50 + genderMod * 100) * 0.05
    );

    categories[key] = Math.min(98, Math.max(8, score));
  }

  // Overall
  const catAvg = catKeys.reduce((s, k) => s + categories[k], 0) / 6;
  const overallScore = Math.round(
    catAvg * 0.40
    + (STAR_FORTUNE[cmdStar] || 0.5) * 100 * 0.25
    + hexagram.tone * 100 * 0.15
    + cycleScore * 0.10
    + nameFortune * 0.10
  );
  const overall = Math.min(98, Math.max(8, overallScore));

  // Lucky attributes
  const benefitElement = Object.keys(GENERATING).find(k => GENERATING[k] === myElement) || '土';
  const luckyColors = ELEMENT_COLORS[benefitElement] || ['黃'];
  const luckyColor = luckyColors[Math.floor(rng() * luckyColors.length)];
  const luckyHex = ELEMENT_HEX[benefitElement] || '#D4A855';
  const luckyNumber = ((birthPillar.stem + todayPillar.stem + todayD) % 9) + 1;
  const luckyDir = ELEMENT_DIR[benefitElement] || '中央';
  // Lucky hour: branch that harmonizes with birth branch
  const luckyHourBranch = SIX_HARMONIES.find(([a, b]) => a === (birthHour % 12) || b === (birthHour % 12));
  const luckyHourIdx = luckyHourBranch ? (luckyHourBranch[0] === (birthHour % 12) ? luckyHourBranch[1] : luckyHourBranch[0]) : (birthHour + 6) % 12;

  // Fortune level
  const fortuneLevel = overall >= 85 ? '大吉' : overall >= 70 ? '中吉' : overall >= 55 ? '小吉' : overall >= 40 ? '平' : overall >= 25 ? '小凶' : overall >= 15 ? '中凶' : '大凶';
  const stars = Math.round(overall / 10) / 2; // 0.5-5.0 stars

  // Fortune text
  const fortuneText = getFortuneText(rng, overall, categories);

  return {
    overall, fortuneLevel, stars,
    categories,
    profile: {
      animal: ZODIAC_DATA[animalIdx].name,
      animalIdx,
      element: myElement,
      western: western.name,
      bloodType,
      gender: gender === 'M' ? '男' : '女',
      yearPillar: STEMS[yearSB.stem] + BRANCHES[yearSB.branch],
    },
    today: {
      date: `${todayY}/${todayM}/${todayD}`,
      pillar: STEMS[todayPillar.stem] + BRANCHES[todayPillar.branch],
      animal: ANIMALS[todayAnimalIdx],
      element: todayElement,
    },
    zodiacRel,
    elemInteraction,
    hexagram,
    ziwei,
    lucky: {
      color: luckyColor, colorHex: luckyHex,
      number: luckyNumber, direction: luckyDir,
      hour: HOUR_NAMES[luckyHourIdx],
    },
    fortuneText,
  };
}

  const heroDate = document.getElementById('heroDate');
  if (heroDate) {
    const weekdays = ['日','一','二','三','四','五','六'];
    heroDate.textContent = now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0') + ' — ' + '星期' + weekdays[now.getDay()];
  }

  const yearSel = document.getElementById('birthYear');
  const currentYear = now.getFullYear();
  for (let y = currentYear; y >= 1940; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '年';
    if (y === 1990) opt.selected = true;
    yearSel.appendChild(opt);
  }

  const monthSel = document.getElementById('birthMonth');
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m + '月';
    monthSel.appendChild(opt);
  }

  const daySel = document.getElementById('birthDay');
  for (let d = 1; d <= 31; d++) {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d + '日';
    daySel.appendChild(opt);
  }

  // Restore saved user data and auto-show today's fortune
  restoreAndAutoCalculate();
})();

function starsHTML(count) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= Math.floor(count)) html += '\u2605';
    else if (i - 0.5 <= count) html += '\u2BEA';
    else html += '\u2606';
  }
  return html;
}

function scrollToResults() {
  const r = document.getElementById('results');
  if (r.classList.contains('show')) r.scrollIntoView({ behavior: 'smooth' });
}

function goBack() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('hero').scrollIntoView({ behavior: 'smooth' });
}

function saveUserData() {
  const data = {
    birthYear: document.getElementById('birthYear').value,
    birthMonth: document.getElementById('birthMonth').value,
    birthDay: document.getElementById('birthDay').value,
    birthHour: document.getElementById('birthHour').value,
    gender: document.getElementById('gender').value,
    bloodType: document.getElementById('bloodType').value,
    surnameStrokes: document.getElementById('surnameStrokes').value,
    nameStrokes: document.getElementById('nameStrokes').value,
  };
  try { localStorage.setItem('dailyfortune_user', JSON.stringify(data)); } catch(e) {}
}

function loadUserData() {
  try {
    const raw = localStorage.getItem('dailyfortune_user');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function restoreAndAutoCalculate() {
  const saved = loadUserData();
  if (!saved) return;
  // Restore form values
  document.getElementById('birthYear').value = saved.birthYear;
  document.getElementById('birthMonth').value = saved.birthMonth;
  document.getElementById('birthDay').value = saved.birthDay;
  document.getElementById('birthHour').value = saved.birthHour;
  document.getElementById('gender').value = saved.gender;
  document.getElementById('bloodType').value = saved.bloodType;
  document.getElementById('surnameStrokes').value = saved.surnameStrokes || '8';
  document.getElementById('nameStrokes').value = saved.nameStrokes || '15';
  // Auto-calculate and show results
  calculate();
}

function calculate() {
  const birthYear = parseInt(document.getElementById('birthYear').value);
  const birthMonth = parseInt(document.getElementById('birthMonth').value);
  const birthDay = parseInt(document.getElementById('birthDay').value);
  const birthHourRaw = parseInt(document.getElementById('birthHour').value);
  const unknownHour = birthHourRaw === -1;
  // If unknown, derive a pseudo-hour from birth date for deterministic results
  const birthHour = unknownHour ? ((birthYear + birthMonth + birthDay) % 12) : birthHourRaw;
  const gender = document.getElementById('gender').value;
  const bloodType = document.getElementById('bloodType').value;
  const surnameStrokes = parseInt(document.getElementById('surnameStrokes').value) || 8;
  const nameStrokes = parseInt(document.getElementById('nameStrokes').value) || 15;

  // Save user data for next visit
  saveUserData();

  const result = calculateFortune(birthYear, birthMonth, birthDay, birthHour, gender, bloodType, surnameStrokes, nameStrokes);
  result.unknownHour = unknownHour;

  renderResults(result);
}

function renderResults(r) {
  const catNames = { love:'愛情運', career:'事業運', wealth:'財運', health:'健康運', study:'學業運', social:'人際運' };
  const catIcons = { love:'♥', career:'⚡', wealth:'$', health:'✚', study:'✎', social:'☺' };

  // Ziwei chart HTML (4x4 grid)
  const chart = r.ziwei;
  // Map palace index to grid positions (traditional layout)
  // Grid: rows 0-3, cols 0-3
  // Top row (L-R): 巳(5) 午(6) 未(7) 申(8)
  // Right col (T-B): 酉(9) 戌(10) 亥(11) (but 申 already in top)
  // Bottom row (R-L): 亥(11) 戌(10)... wait, traditional layout:
  // Row0: 巳 午 未 申
  // Row1: 辰 [center] [center] 酉
  // Row2: 卯 [center] [center] 戌
  // Row3: 寅 丑 子 亥
  const gridMap = {
    5:[0,0], 6:[0,1], 7:[0,2], 8:[0,3],
    4:[1,0], 9:[1,3],
    3:[2,0], 10:[2,3],
    2:[3,0], 1:[3,1], 0:[3,2], 11:[3,3],
  };

  // Build grid cells
  const cells = new Array(16).fill('');
  const todayBranch = r.today.pillar ? BRANCHES.indexOf(r.today.pillar[1]) : -1;

  for (const palace of chart.palaces) {
    const pos = gridMap[palace.branchIndex];
    if (!pos) continue;
    const cellIdx = pos[0] * 4 + pos[1];
    const isFlowDay = palace.branchIndex === (new Date().getDay() + getDayPillar(new Date().getFullYear(), new Date().getMonth()+1, new Date().getDate()).branch) % 12;
    const highlight = palace.name === '命宮' ? ' highlight' : '';
    const starsText = palace.stars.join(' ');
    const huaText = Object.entries(palace.hua).map(([s, h]) => s + h).join(' ');

    cells[cellIdx] = `<div class="ziwei-cell${highlight}">
      <div class="ziwei-palace">${palace.name}【${palace.branch}】</div>
      <div class="ziwei-stars">${starsText || '—'}</div>
      ${huaText ? `<div class="ziwei-hua">${huaText}</div>` : ''}
    </div>`;
  }

  // Center cells (indices 5,6,9,10)
  const centerHTML = `<div class="ziwei-cell center">
    <div style="font-family:'Noto Serif TC',serif;font-size:1.2rem;font-weight:700;color:var(--primary)">紫微命盤</div>
    <div style="font-size:0.8rem;color:var(--text-light);margin-top:0.3rem">${STEMS[chart.yearStem]}${BRANCHES[chart.yearBranch]}年 ${chart.lunar.lMonth}月${chart.lunar.lDay}日</div>
    <div style="font-size:0.75rem;color:var(--text-light)">命宮主星：${chart.cmdStarMain}</div>
    <div style="font-size:0.75rem;color:var(--gold)">五行局：${['','','水二局','木三局','金四局','土五局','火六局'][chart.bureau] || ''}</div>
  </div>`;

  // Fill empty cells and center
  for (let i = 0; i < 16; i++) {
    if ([5,6,9,10].includes(i)) cells[i] = ''; // will be replaced by center
    else if (!cells[i]) cells[i] = '<div class="ziwei-cell"></div>';
  }

  const ziweiHTML = `
    ${cells[0]}${cells[1]}${cells[2]}${cells[3]}
    ${cells[4]}${centerHTML}${cells[7]}
    ${cells[8]}${cells[11]}
    ${cells[12]}${cells[13]}${cells[14]}${cells[15]}
  `;

  // Category cards
  let catHTML = '';
  for (const [key, name] of Object.entries(catNames)) {
    const score = r.categories[key];
    const s = Math.round(score / 10) / 2;
    const level = score >= 70 ? 'high' : score >= 45 ? 'mid' : 'low';
    const texts = FORTUNE_TEXTS[key][level];
    const textIdx = Math.floor(score * 7 % texts.length);
    catHTML += `
      <div class="cat-card">
        <div class="cat-header">
          <span class="cat-name">${catIcons[key]} ${name}</span>
          <span class="cat-stars">${starsHTML(s)}</span>
        </div>
        <div class="cat-bar"><div class="cat-bar-fill" style="width:${score}%"></div></div>
        <div class="cat-text">${texts[textIdx]}</div>
      </div>
    `;
  }

  const html = `
    <!-- Profile -->
    <div class="profile-row">
      <span class="profile-tag"><strong>${r.profile.animal}</strong>年生</span>
      <span class="profile-tag">五行 <strong>${r.profile.element}</strong></span>
      <span class="profile-tag"><strong>${r.profile.western}</strong></span>
      <span class="profile-tag">${r.profile.bloodType}型</span>
      <span class="profile-tag">${r.profile.yearPillar}年</span>
    </div>

    <!-- Overall -->
    <div class="overall-card">
      <div style="font-size:0.9rem;color:var(--text-light);margin-bottom:0.5rem">${r.today.date} ${r.today.pillar}日</div>
      <div class="fortune-level">${r.fortuneLevel}</div>
      <div class="fortune-stars">${starsHTML(r.stars)}</div>
      <div class="fortune-score">綜合運勢 ${r.overall} 分</div>
      <div style="font-size:0.85rem;color:var(--text-light);margin-top:0.5rem">
        今日生肖 ${r.today.animal}・${r.zodiacRel.type}｜五行 ${r.today.element}・${r.elemInteraction.desc}
      </div>
    </div>

    <!-- Ziwei Chart -->
    <h2 class="section-title">紫微命盤</h2>
    ${r.unknownHour ? '<p style="text-align:center;font-size:0.85rem;color:var(--text-light);margin-bottom:0.8rem">⚠ 未提供出生時辰，命盤僅供參考</p>' : ''}
    <div class="ziwei-chart">${ziweiHTML}</div>

    <!-- Categories -->
    <h2 class="section-title">六大運勢</h2>
    <div class="categories-grid">${catHTML}</div>

    <!-- Lucky -->
    <h2 class="section-title">幸運指標</h2>
    <div class="lucky-row">
      <div class="lucky-item">
        <div class="lucky-label">幸運色</div>
        <div class="lucky-value"><span class="lucky-color-swatch" style="background:${r.lucky.colorHex}"></span>${r.lucky.color}</div>
      </div>
      <div class="lucky-item">
        <div class="lucky-label">幸運數字</div>
        <div class="lucky-value">${r.lucky.number}</div>
      </div>
      <div class="lucky-item">
        <div class="lucky-label">幸運方位</div>
        <div class="lucky-value">${r.lucky.direction}</div>
      </div>
      ${r.unknownHour ? '' : `<div class="lucky-item">
        <div class="lucky-label">幸運時段</div>
        <div class="lucky-value">${r.lucky.hour}</div>
      </div>`}
    </div>

    <!-- Hexagram -->
    <h2 class="section-title">今日卦象</h2>
    <div class="hex-card">
      <div class="hex-symbol">${r.hexagram.symbol}</div>
      <div class="hex-name">${r.hexagram.fullName}</div>
      <div class="hex-advice">${r.hexagram.advice}</div>
    </div>

    <!-- Fortune Text -->
    <h2 class="section-title">今日提醒</h2>
    <div class="fortune-text-card">${r.fortuneText}</div>
  `;

  document.getElementById('resultContent').innerHTML = html;
  const results = document.getElementById('results');
  results.classList.add('show');
  setTimeout(() => results.scrollIntoView({ behavior: 'smooth' }), 100);
}
</script>
</body>
</html>
